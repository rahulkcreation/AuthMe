<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecsDeal - OTP Verification</title>
    <style>
        /* CSS Reset & Basics */
        :root {
            --primary-color: #2563eb; /* Trustworthy E-commerce Blue */
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc; /* Very light slate for contrast */
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --input-focus-ring: rgba(37, 99, 235, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Minimalist Main Wrapper */
        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
            position: relative;
            animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    

        /* Typography */
        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
            letter-spacing: -0.5px;
            text-align: center;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
            text-align: center;
        }

        /* Modern OTP Boxes */
        .otp-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 24px;
        }

        .otp-box {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 24px !important;
            font-weight: 700;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--input-bg);
            color: var(--text-main);
            transition: all 0.2s ease;
            padding: 0 !important;
        }

        .otp-box:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--input-focus-ring);
            background-color: #ffffff;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* Links */
        .switch-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .switch-link span {
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-left: 4px;
            transition: color 0.2s;
        }

        .switch-link span:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* Disabled state for resend button */
        .switch-link span.disabled {
            color: #94a3b8;
            cursor: not-allowed;
            text-decoration: none;
        }

        .switch-link span.disabled:hover {
            color: #94a3b8;
            text-decoration: none;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .auth-wrapper {
                padding: 30px 20px;
                border-radius: 16px;
            }
            .otp-box {
                width: 40px;
                height: 50px;
                font-size: 20px !important;
            }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        
      

        <!-- ========================================== -->
        <!-- OTP VERIFICATION SCREEN                    -->
        <!-- ========================================== -->
        <div id="otp-screen">
            <h2>Verification</h2>
            <p class="subtitle">We've sent a 6-digit code to your email/mobile.</p>
            
            <form id="otp-form">
                <div class="otp-container">
                    <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric" required autofocus>
                    <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-box" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                </div>
                <button type="submit" class="btn">Verify & Proceed</button>
            </form>

            <p class="switch-link">Didn't receive the code? <span id="resend-btn" class="disabled" onclick="resendOTP()">Resend in <b id="timer">30</b>s</span></p>
        </div>

    </div>

    <!-- JavaScript for OTP Logic -->
    <script>
        // OTP Input Auto-tabbing Logic
        const otpBoxes = document.querySelectorAll('.otp-box');
        
        otpBoxes.forEach((box, index) => {
            // Handle input
            box.addEventListener('input', (e) => {
                // Ensure only numbers are entered
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                // Move to next box if value is entered
                if (e.target.value && index < otpBoxes.length - 1) {
                    otpBoxes[index + 1].focus();
                }
            });
            
            // Handle backspace
            box.addEventListener('keydown', (e) => {
                // Move to previous box on Backspace if current is empty
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpBoxes[index - 1].focus();
                }
            });

            // Handle paste (optional but good for UX)
            box.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
                if (pastedData) {
                    for (let i = 0; i < pastedData.length; i++) {
                        if (otpBoxes[i]) {
                            otpBoxes[i].value = pastedData[i];
                            if (i < otpBoxes.length - 1) {
                                otpBoxes[i + 1].focus();
                            } else {
                                otpBoxes[i].focus();
                            }
                        }
                    }
                }
            });
        });

        // Timer Logic
        let timeLeft = 30;
        let timerId;
        const resendBtn = document.getElementById('resend-btn');

        function startTimer() {
            timeLeft = 30;
            resendBtn.classList.add('disabled');
            resendBtn.innerHTML = `Resend in <b id="timer">${timeLeft}</b>s`;
            
            clearInterval(timerId);
            
            timerId = setInterval(() => {
                timeLeft--;
                const timerElement = document.getElementById('timer');
                
                if (timerElement) {
                    timerElement.innerText = timeLeft;
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    resendBtn.classList.remove('disabled');
                    resendBtn.innerHTML = "Resend OTP";
                }
            }, 1000);
        }

        // Start timer when page loads
        document.addEventListener('DOMContentLoaded', startTimer);

        // Form Submit Handler
        document.getElementById('otp-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect OTP value
            let otpValue = '';
            otpBoxes.forEach(box => {
                otpValue += box.value;
            });

            console.log("Submitted OTP:", otpValue);
            alert('Verification successful! OTP is: ' + otpValue);
            
            // API call logic can go here
        });

        // Resend OTP Function
        function resendOTP() {
            // Prevent action if timer is still running
            if (timeLeft > 0) return;

            alert("A new OTP has been sent to your number/email!");
            
            // Clear current boxes and focus the first one
            otpBoxes.forEach(box => box.value = '');
            otpBoxes[0].focus();
            
            // Restart the timer
            startTimer();
        }
    </script>
</body>
</html>
