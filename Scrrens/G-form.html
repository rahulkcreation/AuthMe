<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecsDeal - Auth UI</title>
    <style>
        /* CSS Reset & Basics */
        :root {
            --primary-color: #2563eb; /* Trustworthy E-commerce Blue */
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc; /* Very light slate for contrast */
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --input-focus-ring: rgba(37, 99, 235, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Minimalist Main Wrapper */
        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
            position: relative;
        }

       

        /* Screen Switching Logic */
        .screen {
            display: none;
            animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Typography */
        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
            letter-spacing: -0.5px;
            text-align: center;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
            text-align: center;
        }

        /* Form Elements */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-group input:not([type="checkbox"]) {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            color: var(--text-main);
            transition: all 0.2s ease;
            background-color: var(--input-bg);
        }

        .input-group input:not([type="checkbox"]):focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--input-focus-ring);
        }

        .input-group input::placeholder {
            color: #94a3b8;
        }

        /* Password Wrapper for Eye Toggle */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 40px; /* Make space for eye icon */
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        .toggle-password svg {
            width: 18px;
            height: 18px;
        }

        /* Remember Me Checkbox */
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-color); /* Uses the theme blue color */
            cursor: pointer;
            border-radius: 4px;
        }

        .remember-me label {
            font-size: 13.5px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none; /* Prevents text selection on double click */
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: none;
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1.5px solid var(--border-color);
            margin-top: 12px;
            box-shadow: none;
        }

        .btn-outline:hover {
            background-color: var(--bg-color);
            border-color: #cbd5e1;
            transform: none;
            box-shadow: none;
        }

        /* Links */
        .switch-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .switch-link span {
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-left: 4px;
            transition: color 0.2s;
        }

        .switch-link span:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .auth-wrapper {
                padding: 30px 20px;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        
       

        <!-- ========================================== -->
        <!-- 1. LOGIN SCREEN                            -->
        <!-- ========================================== -->
        <div id="login-screen" class="screen active">
            <h2>Login Now</h2>
            <p class="subtitle">Enter your details to access your account.</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">Email / Username</label>
                    <input type="email" id="login-email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('login-password', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="remember-me">
                    <input type="checkbox" id="login-remember">
                    <label for="login-remember">Remember me</label>
                </div>

                <button type="submit" class="btn">Send OTP</button>
            </form>
            
            <p class="switch-link">New to SpecsDeal? <span onclick="switchScreen('register-screen')">Create an account</span></p>
        </div>



        <!-- ========================================== -->
        <!-- 3. REGISTER SCREEN                         -->
        <!-- ========================================== -->
        <div id="register-screen" class="screen">
            <h2>Create account</h2>
            <p class="subtitle">Join SpecsDeal for exclusive offers.</p>
            
            <form id="register-form">

                <div class="input-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" placeholder="Enter your username" required>
                </div>

                
                <div class="input-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="name@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" placeholder="Create a strong password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('reg-password', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </button>
                    </div>
                </div>
                <div class="input-group">
                    <label for="reg-confirm-password">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-confirm-password" placeholder="Repeat password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('reg-confirm-password', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="remember-me">
                    <input type="checkbox" id="reg-remember">
                    <label for="reg-remember">Remember me</label>
                </div>

                <button type="submit" class="btn">Send OTP</button>
            </form>
            
            <p class="switch-link">Already have an account? <span onclick="switchScreen('login-screen')">Login</span></p>
        </div>

    </div>

    <!-- JavaScript for Form Logic and Screen Switching -->
    <script>
        function switchScreen(screenId) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(screen => {
                screen.classList.remove('active');
            });

            const targetScreen = document.getElementById(screenId);
            if (targetScreen) {
                targetScreen.classList.add('active');
            }
            
            clearForms();
        }

        function clearForms() {
            const inputs = document.querySelectorAll('input:not([type="checkbox"])');
            inputs.forEach(input => {
                input.value = '';
                // Reset password fields to 'password' type
                if (input.type === 'text' && input.id.includes('password')) {
                    input.type = 'password';
                }
            });

            // Reset checkboxes
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.checked = false;
            });
            
            // Reset eye icons
            const toggleBtns = document.querySelectorAll('.toggle-password');
            const eyeOffSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
            toggleBtns.forEach(btn => {
                btn.innerHTML = eyeOffSvg;
            });
        }

        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const eyeOffSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
            const eyeOnSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';

            if (input.type === 'password') {
                input.type = 'text';
                button.innerHTML = eyeOnSvg;
            } else {
                input.type = 'password';
                button.innerHTML = eyeOffSvg;
            }
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Login successful! Welcome to SpecsDeal.');
            clearForms();
        });

        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const pwd = document.getElementById('reg-password').value;
            const confirmPwd = document.getElementById('reg-confirm-password').value;
            
            if (pwd !== confirmPwd) {
                alert("Passwords do not match!");
                return;
            }
            alert('Registration successful! Please login.');
            switchScreen('login-screen');
        });
    </script>
</body>
</html>
